<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Team</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <!-- Header-->
    <header class="header">
        <div class="header-title">
            <h1>Dipartimento Scuse Patetiche</h1>
            <span>La nostra serietà è in manutenzione straordinaria.</span>
        </div>
    </header>
    <main class="wrapper">

        <!-- Sezione Team -->
        <section class="team">
            <h2 class="title-container">The blame group</h2>
            <div class="container-cards"></div>
        </section>
    </main>
    <footer class="footer">

        <!-- Sezione lavora con noi -->
        <section class="work-with-us">
            <div class="header-work-whit-us">
                <h2>"Lavora" con noi</h2>
                <span>Da noi non farai carriera, ma avrai sempre un'ottima scusa per non averci provato.</span>
            </div>

            <!-- Input per inserimento dati -->
            <div class="container-form">
                <form id="form-work-whit-us">
                    <label for="input-name">Nome
                        <input type="text" id="input-name" placeholder="Inserisci il tuo nome">
                    </label>
                    <label for="input-role">Ruolo
                        <input type="text" id="input-role" placeholder="Inserisci il ruolo">
                    </label>
                    <label for="input-img">Foto Profilo
                        <input type="text" id="input-img" placeholder="Url foto profilo">
                    </label>
                    <label for="input-email">Email
                        <input type="text" id="input-email" placeholder="Inserisci l'Email">
                    </label>
                    <button type="submit" class="btn-form">Unisciti al team</button>
                </form>
            </div>
        </section>
    </footer>
    <script src="./scripts/teams.js"></script>
    <script src="./scripts/function.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
